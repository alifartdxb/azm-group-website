<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="Page Not Found | AZM Group" data-ar="الصفحة غير موجودة | مجموعة العزم">Page Not Found | AZM Group</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/src/style.css">
  <style>
    .not-found-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      /* Add subtle marble background */
      background: linear-gradient(rgba(245, 240, 232, 0.95), rgba(245, 240, 232, 0.95)), url('/images/marble-texture.jpg') center/cover;
    }
    .not-found-icon {
      font-size: 80px;
      color: var(--azm-accent);
      margin-bottom: 24px;
    }
    .not-found-title {
      font-size: 8rem;
      font-weight: 700;
      color: var(--azm-navy);
      line-height: 1;
      margin-bottom: 16px;
      font-family: var(--font-heading);
    }
    .not-found-text {
      font-size: 1.5rem;
      color: var(--azm-charcoal);
      margin-bottom: 32px;
      max-width: 600px;
    }
  </style>
</head>
<body>
  
  <div class="not-found-container">
    <div class="not-found-icon">🏛️</div>
    <div class="not-found-title">404</div>
    <h2 class="font-heading" style="margin-bottom: 16px;" data-en="Page Not Found" data-ar="الصفحة غير موجودة">Page Not Found</h2>
    <p class="not-found-text" data-en="The page you are looking for might have been removed, had its name changed, or is temporarily unavailable." data-ar="ربما تمت إزالة الصفحة التي تبحث عنها، أو تم تغيير اسمها، أو أنها غير متاحة مؤقتاً.">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    
    <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;">
      <a href="/index.html" class="btn btn-primary" data-en="Return Home" data-ar="العودة للرئيسية">Return Home</a>
      <a href="/contact.html" class="btn btn-outline" data-en="Contact Us" data-ar="تواصل معنا">Contact Us</a>
    </div>
  </div>

  <script>
    // Extremely basic RTL script for the 404 page if someone toggled from before
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('azm-lang');
      if (savedLang === 'ar') {
        document.documentElement.setAttribute('dir', 'rtl');
        document.documentElement.setAttribute('lang', 'ar');
        document.body.classList.add('lang-ar');
        
        document.querySelectorAll('[data-ar]').forEach(el => {
          if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            el.placeholder = el.getAttribute('data-ar');
          } else if (el.tagName === 'OPTION') {
            el.textContent = el.getAttribute('data-ar');
          } else {
            el.textContent = el.getAttribute('data-ar');
          }
        });
      }
    });
  </script>
</body>
</html>
